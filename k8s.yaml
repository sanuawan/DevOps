apiVersion: apps/v1
kind: Deployment
metadata:
  name: laravel-k8s-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: laravel-app
  template:
    metadata:
      labels:
        app: laravel-app
    spec:
      containers:
      - name: laravel-container
        image: devops-app:latest
        imagePullPolicy: Never # Local image use karne ke liye
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: laravel-k8s-service
spec:
  type: NodePort
  selector:
    app: laravel-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080